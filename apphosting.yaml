# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  cpu: 1            # Increase from default if doing heavy data processing
  memoryMiB: 1024   # Doubling the default 512MiB to 1GiB
  maxInstances: 10  # Prevents runaway costs while allowing scaling
  concurrency: 80   # Number of simultaneous requests per instance

